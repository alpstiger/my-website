<!-- 스타일 섹션에 아래 내용을 추가/수정하세요 -->
<style>
    /* ...기존 스타일 유지... */

    .main-image-container { 
        width: 100%; 
        max-width: 1200px; 
        margin: 20px auto; 
        padding: 0 5%; 
        box-sizing: border-box; 
        position: relative; /* 슬라이드 위치 기준 */
        overflow: hidden; 
    }

    .slides {
        display: none; /* 기본적으로 숨김 */
        width: 100%;
        animation: fade 1.5s; /* 부드러운 전환 효과 */
    }

    .slides img { 
        width: 100%; 
        height: auto; 
        border-radius: 15px; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        display: block; 
    }

    /* 페이드 애니메이션 */
    @keyframes fade {
        from {opacity: .4} 
        to {opacity: 1}
    }
</style>

<!-- 본문 이미지 컨테이너 부분을 아래와 같이 수정하세요 -->
<div class="main-image-container">
    <!-- 첫 번째 슬라이드 -->
    <div class="slides">
        <img src="main.jpg" alt="SAI 교류회 이미지 1">
    </div>
    <!-- 두 번째 슬라이드 (기존 main2.png) -->
    <div class="slides">
        <img src="main2.png" alt="SAI 교류회 이미지 2">
    </div>
</div>

<!-- body 태그가 끝나기 직전에 아래 스크립트를 추가하세요 -->
<script>
    let slideIndex = 0;
    showSlides();

    function showSlides() {
        let i;
        let slides = document.getElementsByClassName("slides");
        
        for (i = 0; i < slides.length; i++) {
            slides[i].style.display = "none";  
        }
        
        slideIndex++;
        if (slideIndex > slides.length) {slideIndex = 1}    
        
        slides[slideIndex-1].style.display = "block";  
        
        setTimeout(showSlides, 4000); // 4초마다 이미지 전환
    }
</script>
