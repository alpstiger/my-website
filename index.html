<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect-Mong - 교류회 이벤트 신청</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f9fc;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #fff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e1e8ed;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #e04f5f; /* 빨간색 "Connect-Mong" */
            text-decoration: none;
        }

        .header-info {
            color: #8899a6;
            font-size: 14px;
        }

        main {
            padding: 50px;
            text-align: center;
        }

        .main-title h1 {
            font-size: 28px;
            margin-bottom: 15px;
        }

        .main-title p {
            color: #8899a6;
            margin-top: 0;
            margin-bottom: 40px;
            font-size: 16px;
        }

        /* 변경된 카드 그리드 스타일 - 한 줄에 2개 배치 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2개씩 배치 */
            gap: 40px; /* 카드 사이 여백을 넓혀서 크기 키우는 효과와 조화롭게 */
            max-width: 1200px; /* 전체 너비 제한 */
            margin: 0 auto; /* 중앙 정렬 */
        }

        /* 변경된 카드 스타일 - 전체적으로 크기를 키움 */
        .card {
            background-color: #fff;
            border-radius: 15px; /* 더 둥글게 */
            padding: 40px; /* 내부 여백을 늘려 카드 크기 키움 */
            box-shadow: 0 6px 10px rgba(0,0,0,0.1); /* 그림자 효과 강화 */
            text-align: left; /* 텍스트 정렬 */
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.15);
        }

        .card-icon {
            font-size: 36px; /* 아이콘 크기 키움 */
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 20px; /* 텍스트 크기 약간 키움 */
            font-weight: bold;
            margin-bottom: 15px;
        }

        .card-details {
            font-size: 17px; /* 텍스트 크기 키움 */
            color: #555;
            margin-bottom: 8px;
        }

        /* 변경된 버튼 스타일 - 크기를 키움 */
        .card-btn {
            background-color: #000;
            color: #fff;
            border: none;
            border-radius: 10px; /* 더 둥글게 */
            padding: 20px 25px; /* 버튼 크기 키움 */
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: auto; /* 버튼을 아래로 밀어냄 */
            width: 100%; /* 버튼 너비를 카득 채움 */
            box-sizing: border-box;
            transition: background-color 0.2s;
        }

        .card-btn:hover {
            background-color: #333;
        }
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo">Connect-Mong</a>
        <span class="header-info">한일교류회 공식신청</span>
    </header>

    <main>
        <div class="main-title">
            <h1>교류회 이벤트를 선택하세요</h1>
            <p>원하는 버튼을 클릭하면 신청 페이지로 연결됩니다.</p>
        </div>

        <div class="card-grid">
            <div class="card">
                <div class="card-icon">🌸</div>
                <div class="card-title">봄맞이 한강 피크닉</div>
                <div class="card-details">일시: 3월 28일 (토)</div>
                <div class="card-details">장소: 여의도 한강공원</div>
                <button class="card-btn">신청하러 가기</button>
            </div>

            <div class="card">
                <div class="card-icon">🌸</div>
                <div class="card-title">봄맞이 한강 피크닉</div>
                <div class="card-details">일시: 3월 28일 (토)</div>
                <div class="card-details">장소: 여의도 한강공원</div>
                <button class="card-btn">신청하러 가기</button>
            </div>

            <div class="card">
                <div class="card-icon">🌸</div>
                <div class="card-title">봄맞이 한강 피크닉</div>
                <div class="card-details">일시: 3월 28일 (토)</div>
                <div class="card-details">장소: 여의도 한강공원</div>
                <button class="card-btn">신청하러 가기</button>
            </div>

            <div class="card">
                <div class="card-icon">💻</div>
                <div class="card-title">비즈니스 일본어 스터디</div>
                <div class="card-details">일시: 매주 화요일 저녁</div>
                <div class="card-details">장소: 강남역 스터디룸</div>
                <button class="card-btn">신청하러 가기</button>
            </div>
        </div>
    </main>
</body>
</html>
