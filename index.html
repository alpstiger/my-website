<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAI 際 日韓交流会 | 한일교류회</title>
    <style>
        /* 모바일 최적화 기본 설정 */
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 0; background: #fdfdfd; color: #333; line-height: 1.6; }
        header { background: #fff; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: bold; color: #eb4d4b; text-decoration: none; }
        
        /* 메인 사진 섹션 */
        .main-image-container { width: 100%; max-width: 1200px; margin: 20px auto; padding: 0 5%; box-sizing: border-box; }
        .main-image-container img { width: 100%; height: auto; border-radius: 15px; shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* 타이틀 섹션 */
        .hero { padding: 30px 5%; text-align: center; }
        .hero h1 { font-size: 24px; margin-bottom: 10px; }
        .hero p { font-size: 15px; color: #666; }

        /* 카드 그리드 (반응형: 기본 1줄, 넓어지면 2줄) */
        .container { 
            padding: 20px 5%; 
            display: grid; 
            grid-template-columns: 1fr; /* 휴대폰에서는 1줄 */
            gap: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }

        @media (min-width: 600px) {
            .container { grid-template-columns: 1fr 1fr; } /* 태블릿/PC에서는 2줄 */
            .hero h1 { font-size: 32px; }
        }

        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center; display: flex; flex-direction: column; }
        .card h3 { font-size: 20px; margin: 15px 0 10px; }
        .btn { width: 100%; padding: 15px; border: none; background: #222; color: white; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: auto; font-size: 16px; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">Connect-Mong</a>
    <div style="font-size:12px; color:#888;">한일교류회 공식신청</div>
</header>

<div class="main-image-container">
    <img src="main.jpg" alt="main.jpg">
</div>

<section class="hero">
    <h1>申請する交流会の日付を選択してください<br>신청할 교류회날짜를 선택해 주세요</h1>
    <p>ご希望の交流会をクリックすると、申し込みページへ移動します。<br>원하는 교류회를 클릭하면 신청 페이지로 연결됩니다.</p>
</section>

<div class="container">
    <div class="card">
        <div style="font-size: 40px;">🌸</div>
        <h3>봄맞이 한강 피크닉</h3>
        <p>일시: 3월 28일 (토)<br>장소: 여의도 한강공원</p>
        <button class="btn" onclick="location.href='https://docs.google.com/forms/d/e/1FAIpQLSe8xXlcGCf1ydDNMEYVZzUXjYr_S4BP2ONQbR9Dg-xZPMf_jQ/viewform'">신청하러 가기</button>
    </div>

    <div class="card">
        <div style="font-size: 40px;">💻</div>
        <h3>비즈니스 일본어 스터디</h3>
        <p>일시: 매주 화요일 저녁<br>장소: 강남역 스터디룸</p>
        <button class="btn" onclick="location.href='https://docs.google.com/forms/d/e/1FAIpQLSe8xXlcGCf1ydDNMEYVZzUXjYr_S4BP2ONQbR9Dg-xZPMf_jQ/viewform'">신청하러 가기</button>
    </div>

    <div class="card">
        <div style="font-size: 40px;">🏮</div>
        <h3>신촌 이자카야 교류회</h3>
        <p>일시: 매주 금요일 밤<br>장소: 신촌역 인근</p>
        <button class="btn" onclick="location.href='https://docs.google.com/forms/d/e/1FAIpQLSe8xXlcGCf1ydDNMEYVZzUXjYr_S4BP2ONQbR9Dg-xZPMf_jQ/viewform'">신청하러 가기</button>
    </div>
</div>

</body>
</html>
